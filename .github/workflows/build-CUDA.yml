name: Build CUDA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.python-version }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
        platform: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: astral-sh/setup-uv@v7.3.1
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: "true"

      - name: Install CUDA Toolkit (Ubuntu)
        id: cuda-toolkit-linux
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.6.0'
          method: 'network'
          sub-packages: '["nvcc","cudart","cudart-dev","nvrtc","nvrtc-dev"]'
          non-cuda-sub-packages: '["libnvjitlink","libnvjitlink-dev"]'
          use-local-cache: true

      - name: Install Python packages
        run: |
          uv pip install pytest pytest-cov pytest-benchmark scikit-image

      - name: Build
        run: |
          uv pip install . -v --config-settings=cmake.define.CLE_BACKEND_TYPE=CUDA

      - name: Test
        run: |
          mkdir coverage && cd coverage
          pytest --cov=pyclesperanto ../tests/ --cov-report=xml

      - name: Upload coverage
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage.xml
          fail_ci_if_error: true
