name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.python-version }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
        platform: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: "true"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pocl-opencl-icd ocl-icd-opencl-dev ocl-icd

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pocl

      - name: Install Python packages
        run: |
          uv pip install pytest pytest-cov pytest-benchmark scikit-image

      - name: Build
        run: |
          uv pip install . -v

      - name: Test
        if: runner.os == 'Linux'
        run: |
          mkdir coverage && cd coverage
          pytest --cov=pyclesperanto ../tests/ --cov-report=xml

      - name: Upload coverage
        if: runner.os == 'Linux' && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage.xml
          fail_ci_if_error: true
