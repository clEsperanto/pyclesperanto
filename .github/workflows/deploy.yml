name: Deploy

# Run on release, or when 'ready-to-deploy' label is added to PR:
on:
  pull_request:
    branches: [main]
    types: [labeled]
  release:
    types: [created]

jobs:
  build_wheels:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'release' || contains(github.event.pull_request.labels.*.name, 'ready-to-deploy')
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1 #2.19.2
        env:
          CIBW_ARCHS_MACOS: x86_64 arm64

      - uses: actions/upload-artifact@v7
        with:
          path: ./wheelhouse/*.whl
          name: artifacts-${{ matrix.os }}

  build_sdist:
    name: build dist
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || contains(github.event.pull_request.labels.*.name, 'ready-to-deploy')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v7
        with:
          path: dist/*.tar.gz
          name: artifacts-sdist

  upload_all:
    name: publish (PyPI)
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # upload to PyPI on release event
    if: github.event_name == 'release' && success()
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          verbose: true
