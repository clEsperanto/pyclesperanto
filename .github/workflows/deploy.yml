name: Deploy

# Run on release, or when 'ready-to-deploy' label is added to PR:
on:
  pull_request:
    branches: [main]
    # types: [labeled]
  release:
    types: [created]

env:
  CUDA_VERSION: "12.6.0"

jobs:
  # =========================================================================
  # Build pyclesperanto-opencl wheels (Linux, macOS, Windows)
  # =========================================================================
  build_opencl_wheels:
    name: build opencl (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # if: github.event_name == 'release' || contains(github.event.pull_request.labels.*.name, 'ready-to-deploy')
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: backends/opencl
        env:
          CIBW_ARCHS_MACOS: x86_64 arm64

      - uses: actions/upload-artifact@v7
        with:
          path: ./wheelhouse/*.whl
          name: artifacts-opencl-${{ matrix.os }}

  # =========================================================================
  # Build pyclesperanto-cuda wheels (Linux, Windows — no macOS)
  # =========================================================================
  build_cuda_wheels:
    name: build cuda (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'release' || contains(github.event.pull_request.labels.*.name, 'ready-to-deploy')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # - name: Install CUDA Toolkit (Windows)
      #   if: matrix.os == 'windows-latest'
      #   uses: Jimver/cuda-toolkit@v0.2.35
      #   with:
      #     cuda: '12.6.0'
      #     method: 'local'
      #     sub-packages: '["nvcc","cudart","cudart-dev","nvrtc","nvrtc-dev"]'
      #     non-cuda-sub-packages: '["nvJitLink","nvJitLink-dev"]'
      #     use-local-cache: true
      #     use-github-cache: false

      - name: Install CUDA Toolkit (Windows)
        if: matrix.os == 'windows-latest'
        id: cuda-toolkit-windows
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: 'local'
          use-local-cache: true
          log-file-suffix: '_windows'

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: backends/cuda
        env:
          # On Windows, CUDA is already installed by the action above; skip before-all
          CIBW_BEFORE_ALL_WINDOWS: ""

      - uses: actions/upload-artifact@v7
        with:
          path: ./wheelhouse/*.whl
          name: artifacts-cuda-${{ matrix.os }}

  build_metal_wheels:
    name: build metal (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # if: github.event_name == 'release' || contains(github.event.pull_request.labels.*.name, 'ready-to-deploy')
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        with:
          package-dir: backends/metal
        env:
          CIBW_ARCHS_MACOS: x86_64 arm64

      - uses: actions/upload-artifact@v7
        with:
          path: ./wheelhouse/*.whl
          name: artifacts-metal-${{ matrix.os }}

  # =========================================================================
  # Build pyclesperanto pure Python package (sdist + wheel)
  # =========================================================================
  build_main:
    name: build pyclesperanto
    runs-on: ubuntu-latest
    # if: github.event_name == 'release' || contains(github.event.pull_request.labels.*.name, 'ready-to-deploy')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build sdist and wheel
        run: pipx run build

      - uses: actions/upload-artifact@v7
        with:
          path: dist/*
          name: artifacts-main

  # =========================================================================
  # Publish all packages to PyPI
  # =========================================================================
  upload_all:
    name: publish (PyPI)
    needs: [build_opencl_wheels, build_cuda_wheels, build_metal_wheels, build_main]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: dist
          merge-multiple: true

      # # TestPyPI on PR with 'ready-to-deploy' label
      # - name: Publish to TestPyPI
      #   if: github.event_name == 'pull_request'
      #   uses: pypa/gh-action-pypi-publish@v1.13.0
      #   with:
      #     password: ${{ secrets.TEST_PYPI_TOKEN }}
      #     repository-url: https://test.pypi.org/legacy/
      #     skip-existing: true
      #     verbose: true

      # Real PyPI on release
      - name: Publish to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          verbose: true
